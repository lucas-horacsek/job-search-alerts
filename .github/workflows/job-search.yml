name: Weekly Job Search Alerts

on:
  # Runs every Monday at 1:00 PM UTC (9:00 AM ET)
  schedule:
    - cron: "0 13 * * 1"
  # Allow manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen listings cache
        uses: actions/cache@v4
        with:
          path: seen_listings.json
          key: seen-listings-${{ github.run_number }}
          restore-keys: |
            seen-listings-

      - name: Run job search
        env:
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python search_jobs.py

      - name: Save seen listings
        if: always()
        run: |
          if [ -f seen_listings.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add seen_listings.json
            git diff --cached --quiet || git commit -m "Update seen listings [skip ci]"
            git push
          fi
